name: web-login
description: Log into a website and capture the result (using KVM + Chrome).
steps:
  - uri: app://{host}/desktop/command/launch
    payload: {app: "google-chrome", args: ["https://example.com/login"]}
    why: open the login page in Chrome
  - uri: kvm://{host}/ui/query/wait
    payload: {text: "Login", timeout: 10}
    why: wait for the login page to load
  - uri: kvm://{host}/input/command/type
    payload: {text: "jan@firma.pl"}
    why: type the email
  - uri: kvm://{host}/input/command/key
    payload: {keys: "tab"}
    why: move to the password field
  - uri: kvm://{host}/input/command/type
    payload: {text: "tajneHaslo"}
    why: type the password
  - uri: kvm://{host}/input/command/key
    payload: {keys: "enter"}
    why: submit the login
  - uri: kvm://{host}/screen/query/capture
    payload: {}
    why: capture the page after login
