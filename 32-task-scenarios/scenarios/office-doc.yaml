name: office-doc
description: Open a document, type text into it, save, and verify.
steps:
  - uri: app://{host}/desktop/command/launch
    payload: {app: "gnome-text-editor", args: ["/tmp/raport.txt"]}
    why: launch the text editor with a new report file
  - uri: kvm://{host}/ui/query/wait
    payload: {text: "raport.txt", timeout: 8}
    why: wait for the editor window to open
  - uri: kvm://{host}/input/command/type
    payload: {text: "Faktura 07/2026 -- zatwierdzona"}
    why: type the invoice text
  - uri: kvm://{host}/input/command/key
    payload: {keys: "ctrl+s"}
    why: save the document
  - uri: kvm://{host}/ui/query/verify
    payload: {expect: "Faktura 07/2026"}
    why: verify the text is present in the editor
  - uri: kvm://{host}/input/command/key
    payload: {keys: "ctrl+q"}
    why: close the editor
