name: desktop-control
description: Drive the desktop — screenshot, OCR-click a label, type, hotkey (kvm).
steps:
  - uri: kvm://{host}/screen/query/capture
    payload: {}
    why: capture the primary monitor
  - uri: kvm://{host}/ui/command/click-text
    payload: {text: "Messaging"}
    why: click the on-screen label "Messaging" (OCR-located)
  - uri: kvm://{host}/input/command/type
    payload: {text: "hello"}
    why: type some text
  - uri: kvm://{host}/input/command/key
    payload: {keys: "ctrl+a"}
    why: select all with Ctrl+A
  - uri: kvm://{host}/ui/query/verify
    payload: {expect: "hello"}
    why: verify that the typed text "hello" is on the screen

