name: desktop-control
description: Drive the desktop — screenshot, OCR-click a label, type, hotkey (kvm + him).
steps:
  - uri: kvm://{host}/monitor/query/list
    why: enumerate monitors
  - uri: kvm://{host}/monitor/{monitor}/query/screenshot
    payload: {}
    why: capture the primary monitor
  - uri: kvm://{host}/task/command/click-text
    payload: {text: "Plik"}
    why: click the on-screen label "Plik" (OCR-located)
  - uri: him://{host}/keyboard/command/type-text
    payload: {text: "raport.txt"}
    why: type a filename
  - uri: him://{host}/keyboard/command/hotkey
    payload: {keys: ["ctrl", "s"]}
    why: save with Ctrl+S
