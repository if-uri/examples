name: monitoruj-system-data-nazwa-systemu-3-pr
description: "monitoruj system: data, nazwa systemu, 3 procesy"
steps:
  - uri: shell://laptop/command/date
    why: "Pobieram aktualną datę i czas."
  - uri: shell://laptop/command/uname
    why: "Pobieram nazwę systemu."
  - uri: proc://laptop/process/query/list
    payload: {"limit": 3}
    why: "Pobieram listę 3 procesów."
