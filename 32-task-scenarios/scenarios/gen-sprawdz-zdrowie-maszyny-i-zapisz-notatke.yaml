name: sprawdz-zdrowie-maszyny-i-zapisz-notatke
description: "sprawdz zdrowie maszyny i zapisz notatke o procesach"
steps:
  - uri: env://{host}/runtime/query/health
    why: "Sprawdzam zdrowie maszyny."
  - uri: proc://{host}/process/query/list
    payload: {"limit": 5}
    why: "Pobieram listę aktywnych procesów w celu identyfikacji ewentualnych problemów."
  - uri: log://{host}/session/command/write
    payload: {"text": "Maszyna zdrowa. Procesy: $ref:1.processes"}
    why: "Zapisuję notatkę o stanie procesów w logu sesji."
