uri_tree:
  planfile_tasks:
    status: available
    verified: true
    category: Planning
    description: Plan, group and execute daily tasks through task:// and planfile://
      URI commands.
    schemes:
      planfile:
        host:
          dsl:
            command:
              run:
                uri: planfile://host/dsl/command/run
      task:
        host:
          ticket:
            command:
              block:
                uri: task://host/ticket/command/block
              complete:
                uri: task://host/ticket/command/complete
              create:
                uri: task://host/ticket/command/create
              fail:
                uri: task://host/ticket/command/fail
              ready:
                uri: task://host/ticket/command/ready
              start:
                uri: task://host/ticket/command/start
            query:
              next:
                uri: task://host/ticket/query/next
              show:
                uri: task://host/ticket/query/show
          tickets:
            query:
              list:
                uri: task://host/tickets/query/list
  sqlite_context_store:
    status: available
    verified: true
    category: Data
    description: Local data, artifacts, checks and logs over data://, artifact://,
      check:// and log://.
    schemes:
      artifact:
        host:
          artifact:
            command:
              register:
                uri: artifact://host/artifact/command/register
          artifacts:
            query:
              list:
                uri: artifact://host/artifacts/query/list
      check:
        host:
          check:
            command:
              add:
                uri: check://host/check/command/add
          checks:
            query:
              recent:
                uri: check://host/checks/query/recent
      data:
        host:
          dataset:
            command:
              create:
                uri: data://host/dataset/command/create
          datasets:
            query:
              list:
                uri: data://host/datasets/query/list
          record:
            command:
              upsert:
                uri: data://host/record/command/upsert
          records:
            query:
              search:
                uri: data://host/records/query/search
          sql:
            query:
              read-only:
                uri: data://host/sql/query/read-only
      log:
        host:
          daily:
            command:
              write:
                uri: log://host/daily/command/write
          logs:
            query:
              recent:
                uri: log://host/logs/query/recent
  domain_monitor:
    status: available
    verified: true
    category: Operations
    description: HTTP, DNS reads, screenshots, logs and daily domain checks through
      URI commands.
    schemes:
      browser:
        host:
          page:
            command:
              screenshot:
                uri: browser://host/page/command/screenshot
      flow:
        host:
          daily:
            command:
              run:
                uri: flow://host/daily/command/run
          domain:
            command:
              check:
                uri: flow://host/domain/command/check
      log:
        host:
          daily:
            command:
              write:
                uri: log://host/daily/command/write
          logs:
            query:
              recent:
                uri: log://host/logs/query/recent
      monitor:
        host:
          dns:
            query:
              current:
                uri: monitor://host/dns/query/current
              expected:
                uri: monitor://host/dns/query/expected
          http:
            query:
              status:
                uri: monitor://host/http/query/status
  http_check:
    status: available
    verified: true
    category: Operations
    description: Check HTTP endpoints through httpcheck:// URI commands and a small
      Python CLI.
    schemes:
      httpcheck:
        host:
          http:
            query:
              status:
                uri: httpcheck://host/http/query/status
  time_tools:
    status: available
    verified: false
    category: Operations
    description: Expose current time and timezone checks through time:// URI commands.
    schemes:
      time:
        host:
          clock:
            query:
              now:
                uri: time://host/clock/query/now
  namecheap_dns:
    status: available
    verified: true
    category: DNS
    description: Safe DNS query, plan, backup and apply flow for Namecheap host records.
    schemes:
      dns:
        host:
          records:
            command:
              apply:
                uri: dns://host/records/command/apply
              backup:
                uri: dns://host/records/command/backup
              plan:
                uri: dns://host/records/command/plan
            query:
              current:
                uri: dns://host/records/query/current
              expected:
                uri: dns://host/records/query/expected
  grpc_transport:
    status: available
    verified: true
    category: Transport
    description: Expose and call URI registries over gRPC for service-to-service communication.
    schemes:
      transport:
        grpc:
          service:
            command:
              serve:
                uri: transport://grpc/service/command/serve
  browser_control:
    status: available
    verified: true
    category: Automation
    description: Drive browser/noVNC actions through browser:// URI commands for demos
      and QA.
    schemes:
      browser:
        desktop:
          page:
            command:
              open:
                uri: browser://desktop/page/command/open
              screenshot:
                uri: browser://desktop/page/command/screenshot

