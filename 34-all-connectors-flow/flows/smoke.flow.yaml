# generated by run.py — a ready urirun flow you can read and run
task:
  title: Use every urirun connector (one route each)
allow:
- browser://*
- fs://*
- httpcheck://*
- log://*
- monitor://*
- node://*
- pkg://*
- time://*
steps:
- id: use-time-tools
  uri: time://host/clock/query/now
  payload: {}
- id: use-mcp-filesystem
  uri: fs://host/dir/query/list
  payload:
    path: .
- id: use-http-check
  uri: httpcheck://host/http/query/status
  payload:
    url: https://example.com
- id: use-domain-monitor
  uri: monitor://host/dns/query/current
  payload:
    domain: example.com
    current_records:
    - Name: '@'
      Type: A
      Address: 203.0.113.10
- id: use-get-node
  uri: node://get/installer/query/script
  payload: {}
- id: use-sqlite-context
  uri: log://host/logs/query/recent
  payload:
    limit: 5
- id: use-browser-control
  uri: browser://chrome/page/query/text
  payload:
    url: https://example.com
    max: 80
- id: check-email
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_email
- id: check-mqtt
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_mqtt
- id: check-ksef
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_ksef
- id: check-planfile
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_planfile
- id: check-namecheap-dns
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_namecheap_dns
- id: check-llm
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_llm
- id: check-kvm
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_kvm
- id: check-flow-repair
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_flow_repair
