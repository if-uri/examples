# generated by run.py — a ready urirun flow you can read and run
task:
  title: Use every urirun connector (one route each)
allow:
- pkg://*
- time://*
steps:
- id: use-time-tools
  uri: time://host/clock/query/now
  payload: {}
- id: check-mcp-filesystem
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_mcp_filesystem
- id: check-http-check
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_http_check
- id: check-domain-monitor
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_domain_monitor
- id: check-get-node
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_get_node
- id: check-sqlite-context
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_sqlite_context
- id: check-browser-control
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_browser_control
- id: check-email
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_email
- id: check-mqtt
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_mqtt
- id: check-ksef
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_ksef
- id: check-planfile
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_planfile
- id: check-namecheap-dns
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_namecheap_dns
- id: check-llm
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_llm
- id: check-kvm
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_kvm
- id: check-flow-repair
  uri: pkg://host/connector/query/installed
  payload:
    module: urirun_connector_flow_repair
