name: e2e

on:
  workflow_dispatch:
    inputs:
      urirun_repo_url:
        description: "urirun repository URL to install for host examples"
        type: string
        default: "https://github.com/if-uri/urirun.git"
      urirun_ref:
        description: "urirun ref/SHA to install for host examples"
        type: string
        default: "main"
  schedule:
    - cron: "17 3 * * *"   # nightly 03:17 UTC

permissions:
  contents: read

jobs:
  full-e2e:
    name: full Docker E2E (12-full_e2e_connect_lab)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Public endpoint smoke
        run: make -C 12-full_e2e_connect_lab public-smoke
      - name: Full Docker scenario (nodes + connectors + MCP/A2A + flow)
        run: make -C 12-full_e2e_connect_lab test
      - name: Logs on failure
        if: failure()
        run: make -C 12-full_e2e_connect_lab logs || true

  novnc-uri-flow:
    name: noVNC URI flow (11-novnc_lan_flow)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Four-computer noVNC URI flow
        run: make -C 11-novnc_lan_flow test-full
      - name: Logs on failure
        if: failure()
        run: make -C 11-novnc_lan_flow logs || true

  host-examples:
    name: host-runnable examples (NN-*)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install PHP (for 05-generators)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends php-cli
      - name: Install urirun under test
        env:
          URIRUN_REPO_URL: ${{ inputs.urirun_repo_url || vars.URIRUN_REPO_URL || 'https://github.com/if-uri/urirun.git' }}
          URIRUN_REF: ${{ inputs.urirun_ref || vars.URIRUN_REF || 'main' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install "git+${URIRUN_REPO_URL}@${URIRUN_REF}#subdirectory=adapters/python"
      - name: Run host examples (Docker demos skipped)
        run: PYTHON=python ./run_tests.sh
