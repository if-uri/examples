<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ifURI noVNC URI Flow</title>
    <script src="./runtime-config.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #d9dee7;
        --text: #172033;
        --muted: #5c667a;
        --accent: #176f6a;
        --danger: #9b2d30;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(360px, 0.85fr);
        gap: 14px;
        padding: 14px;
      }

      .pc-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 14px;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        font-weight: 700;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
      }

      .ok {
        color: var(--accent);
      }

      .bad {
        color: var(--danger);
      }

      iframe {
        display: block;
        width: 100%;
        height: 360px;
        border: 0;
        background: #0d1117;
      }

      .side {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .controls,
      .result,
      .logs {
        padding: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-weight: 600;
      }

      select,
      input,
      button {
        min-height: 36px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        font: inherit;
      }

      select,
      input {
        width: 100%;
        padding: 7px 9px;
      }

      button {
        padding: 7px 12px;
        cursor: pointer;
      }

      .form-row {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      pre {
        max-height: 310px;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border: 1px solid var(--line);
        background: #0f1720;
        color: #d8e2ef;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      @media (max-width: 960px) {
        main {
          grid-template-columns: 1fr;
        }

        iframe {
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>ifURI noVNC URI Flow</h1>
        <div class="status">browser:// routes execute inside Docker desktops, visible through noVNC</div>
      </div>
      <button id="refresh">Refresh</button>
    </header>

    <main>
      <section class="pc-grid" id="pcGrid"></section>
      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">URI command</div>
            <div class="status" id="commandStatus">idle</div>
          </div>
          <div class="controls">
            <div class="form-row">
              <label for="target">Target computer</label>
              <select id="target"></select>
            </div>
            <div class="form-row">
              <label for="url">URL</label>
              <input id="url" value="https://example.com/" />
            </div>
            <div class="button-row">
              <button id="openPage">Run open URI</button>
              <button id="screenshotPage">Run screenshot URI</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Result</div>
          </div>
          <div class="result">
            <pre id="result">{}</pre>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Logs</div>
          </div>
          <div class="logs">
            <pre id="logs">[]</pre>
          </div>
        </section>
      </aside>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);

      function configWithOverrides(baseConfig) {
        const next = JSON.parse(JSON.stringify(baseConfig || { visiblePcs: [], pcs: {} }));
        const visible = params.get("pcs") || params.get("visiblePcs");
        if (visible) {
          next.visiblePcs = visible.split(",").map((item) => item.trim()).filter(Boolean);
        }
        for (const name of Object.keys(next.pcs || {})) {
          const apiPort = params.get(`${name}ApiPort`) || params.get(`${name}.apiPort`);
          const novncPort = params.get(`${name}NovncPort`) || params.get(`${name}.novncPort`);
          if (apiPort) next.pcs[name].apiPort = apiPort;
          if (novncPort) next.pcs[name].novncPort = novncPort;
        }
        return next;
      }

      const cfg = configWithOverrides(window.URI_RUN_NOVNC_CONFIG);
      const host = window.location.hostname || "127.0.0.1";
      const visible = cfg.visiblePcs || Object.keys(cfg.pcs || {});
      const pcGrid = document.querySelector("#pcGrid");
      const target = document.querySelector("#target");
      const resultEl = document.querySelector("#result");
      const logsEl = document.querySelector("#logs");
      const statusEl = document.querySelector("#commandStatus");

      function apiBase(name) {
        return `http://${host}:${cfg.pcs[name].apiPort}`;
      }

      function noVncUrl(name) {
        return `http://${host}:${cfg.pcs[name].novncPort}/?autoconnect=1&resize=scale`;
      }

      function print(node, value) {
        node.textContent = JSON.stringify(value, null, 2);
      }

      function renderPcs() {
        pcGrid.innerHTML = "";
        target.innerHTML = "";
        for (const name of visible) {
          if (!cfg.pcs[name]) continue;
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          target.appendChild(option);

          const card = document.createElement("article");
          card.className = "panel";
          card.innerHTML = `
            <div class="panel-head">
              <div class="panel-title">${name}</div>
              <div class="status" id="status-${name}">checking</div>
            </div>
            <iframe src="${noVncUrl(name)}" title="${name} noVNC"></iframe>
          `;
          pcGrid.appendChild(card);
        }
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let body = {};
        try {
          body = text ? JSON.parse(text) : {};
        } catch {
          body = { raw: text };
        }
        if (!response.ok) throw Object.assign(new Error(`${response.status} ${url}`), { body });
        return body;
      }

      async function refresh() {
        const allLogs = {};
        for (const name of visible) {
          if (!cfg.pcs[name]) continue;
          const node = document.querySelector(`#status-${name}`);
          try {
            const health = await fetchJson(`${apiBase(name)}/health`);
            node.textContent = `${health.routes} URI routes`;
            node.className = "status ok";
            allLogs[name] = await fetchJson(`${apiBase(name)}/logs`);
          } catch (error) {
            node.textContent = "offline";
            node.className = "status bad";
            allLogs[name] = { ok: false, error: String(error) };
          }
        }
        print(logsEl, allLogs);
        try {
          const flow = await fetchJson("./generated/flow-result.json");
          print(resultEl, flow);
        } catch {
          // The manual buttons below still show their result here.
        }
      }

      async function runUri(kind) {
        const name = target.value;
        const url = document.querySelector("#url").value.trim();
        const uri = `browser://${name}/page/command/${kind}`;
        statusEl.textContent = `running ${uri}`;
        try {
          const payload = kind === "screenshot" ? { url, output: `${name}-manual.png` } : { url };
          const body = await fetchJson(`${apiBase(name)}/run`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uri, payload }),
          });
          statusEl.textContent = body.ok ? "ok" : "failed";
          statusEl.className = body.ok ? "status ok" : "status bad";
          print(resultEl, body);
          await refresh();
        } catch (error) {
          statusEl.textContent = "failed";
          statusEl.className = "status bad";
          print(resultEl, { ok: false, error: String(error), body: error.body });
        }
      }

      document.querySelector("#refresh").addEventListener("click", refresh);
      document.querySelector("#openPage").addEventListener("click", () => runUri("open"));
      document.querySelector("#screenshotPage").addEventListener("click", () => runUri("screenshot"));

      renderPcs();
      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
